<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover\" />
  <meta name=\"apple-mobile-web-app-capable\" content=\"yes\" />
  <meta name=\"apple-mobile-web-app-status-bar-style\" content=\"black-translucent\" />
  <meta name=\"theme-color\" content=\"#2b000b\" />
  <title>For You ❤️</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255, 45, 85, 0.22), transparent 35%),
        linear-gradient(180deg, #060000, #180006 55%, #2b000b);
      color: white;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    .main-page,
    .island-page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .main-page {
      position: relative;
      text-align: center;
      padding: 20px;
    }

    .main-page h1 {
      font-size: 2.4rem;
      color: #ffd6dd;
      margin-bottom: 10px;
      animation: fadeDown 1.5s ease forwards;
    }

    .main-page p {
      color: #ffc2cb;
      font-size: 1rem;
      margin-bottom: 28px;
      animation: fadeDown 1.8s ease forwards;
    }

    .gif-box {
      width: 280px;
      height: 280px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.04);
      box-shadow:
        0 0 35px rgba(255, 40, 80, 0.35),
        inset 0 0 25px rgba(255, 255, 255, 0.06);
      overflow: hidden;
      animation: float 4s ease-in-out infinite;
      z-index: 5;
    }

    .gif-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .tap-btn {
      margin-top: 35px;
      padding: 13px 30px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff4d6d, #9d0208);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(255, 45, 85, 0.35);
      transition: 0.3s ease;
      z-index: 5;
      -webkit-appearance: none;
      appearance: none;
      min-height: 44px;
      min-width: 100px;
    }

    .tap-btn:hover {
      transform: translateY(-3px) scale(1.05);
    }

    .tap-btn:active {
      transform: translateY(-1px) scale(1.02);
    }

    .island-page {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 12%, rgba(255, 160, 160, 0.35), transparent 18%),
        linear-gradient(180deg, #33000d 0%, #5c0015 45%, #140004 100%);
      z-index: 10;
      transform: translateY(100%);
      transition: 0.9s ease;
      overflow: hidden;
      padding: 22px;
    }

    .island-page.active {
      transform: translateY(0);
    }

    .greeting {
      position: absolute;
      top: 35px;
      text-align: center;
      width: 100%;
      padding: 0 20px;
      z-index: 5;
    }

    .greeting h2 {
      font-size: 2.2rem;
      color: #ffe1e7;
      margin-bottom: 8px;
      text-shadow: 0 0 18px rgba(255, 120, 140, 0.5);
    }

    .greeting p {
      color: #ffc7d0;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .moon {
      position: absolute;
      top: 115px;
      right: 18%;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffd6dd, #ff7a90);
      box-shadow: 0 0 45px rgba(255, 150, 165, 0.6);
    }

    .water {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 42%;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.06) 0px,
          rgba(255, 255, 255, 0.06) 2px,
          transparent 4px,
          transparent 16px
        ),
        linear-gradient(180deg, #7a001d, #250006);
      animation: waterMove 5s linear infinite;
    }

    .island {
      position: absolute;
      bottom: 105px;
      width: 420px;
      height: 155px;
      background: linear-gradient(180deg, #b51735, #4a0011);
      border-radius: 52% 48% 45% 55%;
      box-shadow:
        0 22px 45px rgba(0, 0, 0, 0.5),
        inset 0 12px 18px rgba(255, 255, 255, 0.08);
      z-index: 3;
    }

    .island::before {
      content: "";
      position: absolute;
      top: -25px;
      left: 55px;
      width: 310px;
      height: 80px;
      background: linear-gradient(180deg, #ff4d6d, #b51735);
      border-radius: 50%;
      filter: blur(1px);
    }

    .bouquet-card {
      position: absolute;
      bottom: 185px;
      width: 250px;
      height: 300px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 4;
      box-shadow:
        0 0 35px rgba(255, 72, 100, 0.45),
        inset 0 0 20px rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      animation: bouquetFloat 3.5s ease-in-out infinite;
    }

    .bouquet-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 20px;
    }

    .close-btn {
      position: absolute;
      top: max(22px, 22px + env(safe-area-inset-top));
      right: max(22px, 22px + env(safe-area-inset-right));
      width: 48px;
      height: 48px;
      min-width: 44px;
      min-height: 44px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      color: white;
      font-size: 1.3rem;
      cursor: pointer;
      z-index: 20;
      backdrop-filter: blur(8px);
      -webkit-appearance: none;
      appearance: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .close-btn:active {
      background: rgba(255, 255, 255, 0.2);
    }

    .heart {
      position: absolute;
      bottom: -30px;
      color: #ffb3c1;
      font-size: 18px;
      opacity: 0;
      animation: heartRise linear infinite;
      z-index: 15;
      pointer-events: none;
    }

    .word-float {
      position: absolute;
      bottom: -50px;
      color: #ffd6dd;
      font-weight: 600;
      letter-spacing: 1px;
      opacity: 0;
      text-shadow:
        0 0 10px rgba(255, 90, 120, 0.8),
        0 0 20px rgba(255, 40, 80, 0.5);
      animation: wordRise linear infinite;
      z-index: 15;
      pointer-events: none;
      white-space: nowrap;
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-16px);
      }
    }

    @keyframes bouquetFloat {
      0%, 100% {
        transform: translateY(0) rotate(-1deg);
      }
      50% {
        transform: translateY(-14px) rotate(1deg);
      }
    }

    @keyframes waterMove {
      from {
        background-position: 0 0;
      }
      to {
        background-position: 0 80px;
      }
    }

    @keyframes heartRise {
      0% {
        transform: translateY(0) scale(0.7);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) scale(1.3);
        opacity: 0;
      }
    }

    @keyframes wordRise {
      0% {
        transform: translateY(0) scale(0.8) rotate(-4deg);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      50% {
        transform: translateY(-55vh) scale(1.05) rotate(4deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-115vh) scale(1.25) rotate(-4deg);
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      .main-page {
        padding: max(20px, env(safe-area-inset-left)) max(20px, env(safe-area-inset-right));
      }

      .main-page h1 {
        font-size: clamp(1.6rem, 5vw, 2.4rem);
      }

      .main-page p {
        font-size: clamp(0.9rem, 4vw, 1rem);
      }

      .gif-box {
        width: clamp(200px, 60vw, 280px);
        height: clamp(200px, 60vw, 280px);
      }

      .tap-btn {
        min-height: 44px;
        min-width: 120px;
        padding: clamp(10px, 2.5vh, 13px) clamp(25px, 5vw, 30px);
        margin-top: clamp(25px, 5vh, 35px);
        font-size: clamp(0.9rem, 3vw, 1rem);
      }

      .greeting h2 {
        font-size: clamp(1.5rem, 5vw, 2.2rem);
      }

      .greeting p {
        font-size: clamp(0.9rem, 3.5vw, 1.05rem);
      }

      .island {
        width: clamp(280px, 80vw, 420px);
        height: clamp(100px, 20vw, 155px);
      }

      .bouquet-card {
        width: clamp(180px, 60vw, 250px);
        height: clamp(220px, 75vw, 300px);
        bottom: clamp(140px, 25vh, 185px);
      }

      .moon {
        width: clamp(50px, 15vw, 90px);
        height: clamp(50px, 15vw, 90px);
        top: clamp(80px, 15vh, 115px);
      }

      .island-page {
        padding: clamp(15px, env(safe-area-inset-top), 22px) clamp(15px, env(safe-area-inset-right), 22px);
      }
    }

    @media (max-width: 480px) {
      body {
        font-size: 14px;
      }

      .main-page h1 {
        font-size: clamp(1.4rem, 6vw, 2rem);
      }

      .gif-box {
        animation: none;
      }

      .tap-btn {
        margin-top: 20px;
      }

      .greeting {
        top: 20px;
      }

      .heart {
        font-size: clamp(12px, 4vw, 16px);
      }

      .word-float {
        font-size: clamp(11px, 3vw, 18px);
      }
    }

    @media (max-height: 600px) {
      .main-page {
        justify-content: flex-start;
        padding-top: clamp(15px, 5vh, 30px);
      }

      .gif-box {
        margin-top: 10px;
        margin-bottom: 10px;
      }

      .tap-btn {
        margin-top: 15px;
      }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      .main-page h1 {
        margin-bottom: 5px;
      }

      .main-page p {
        margin-bottom: 15px;
      }

      .gif-box {
        width: clamp(120px, 30vw, 180px);
        height: clamp(120px, 30vw, 180px);
      }

      .tap-btn {
        margin-top: 10px;
        padding: 8px 20px;
      }
    }

    @media (hover: none) and (pointer: coarse) {
      .tap-btn:hover {
        transform: none;
      }

      .close-btn:hover {
        background: rgba(255, 255, 255, 0.12);
      }
    }
  </style>
</head>

<body>
  <section class="main-page">
    <h1>For My Azhagieya kanmani ❤️</h1>
    <p>You are the most beautiful chapter In the book of my life!!</p>

    <div class="gif-box">
      <!-- Local GIF -->
      <img src="public/tumblr_42551060c0edfb479b2bf36ed1ccfbc8_41497f12_640.gif" alt="Red lily animation" />
    </div>

    <button class="tap-btn" onclick="openIsland()">Tap Me ❤️</button>
  </section>

  <section class="island-page" id="islandPage">
    <button class="close-btn" onclick="closeIsland()">×</button>

    <div class="greeting">
      <h2>Welcome to My Little Red Island ❤️</h2>
      <p>
        This bouquet is for you, because you make every moment feel beautiful.
      </p>
    </div>

    <div class="moon"></div>
    <div class="water"></div>

    <div class="bouquet-card">
      <!-- Local bouquet image -->
      <img src="public/Gemini_Generated_Image_n3en4tn3en4tn3en-removebg-preview.png" alt="Bouquet for you" />
    </div>

    <div class="island"></div>
  </section>

  <!-- Local song file -->
  <audio id="loveSong" loop>
    <source src="public\Kannana-Kanne.mp3" type="audio/mpeg">
  </audio>

  <script>
    const islandPage = document.getElementById("islandPage");
    const loveSong = document.getElementById("loveSong");

    function openIsland() {
      islandPage.classList.add("active");

      loveSong.currentTime = 0;
      loveSong.play().catch(() => {
        console.log("Audio play was blocked or song file was not found.");
      });
    }

    function closeIsland() {
      islandPage.classList.remove("active");

      loveSong.pause();
      loveSong.currentTime = 0;
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = Math.random() > 0.5 ? "❤️" : "❣️";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = 4 + Math.random() * 4 + "s";
      heart.style.fontSize = 15 + Math.random() * 16 + "px";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 8000);
    }

    function createWord() {
      const words = ["Azhagiee", "Chello", "Kanmaniyee", "Thanga mayiluu", "Ammu"];

      const word = document.createElement("div");
      word.className = "word-float";
      word.innerHTML = words[Math.floor(Math.random() * words.length)];

      word.style.left = Math.random() * 85 + "vw";
      word.style.animationDuration = 5 + Math.random() * 4 + "s";
      word.style.fontSize = 18 + Math.random() * 12 + "px";

      document.body.appendChild(word);

      setTimeout(() => {
        word.remove();
      }, 9000);
    }

    setInterval(createHeart, 500);
    setInterval(createWord, 900);
  </script>
</body>
</html>
